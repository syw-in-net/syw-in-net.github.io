<h1><code>Object.clear</code> <em>(ext/object/clear)</em></h1>
<p>Deletes all own, enumerable, non-symbol properties in the object</p>
<pre><code class="language-javascript">const clear = require(&quot;ext/object/clear&quot;);

const obj = { foo: &quot;bar&quot; };

clear(obj);
Object.keys(obj); // []
</code></pre>
